<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#0b132b"/>
  <!-- Glowing Cloud / Tech Background -->
  <circle cx="200" cy="150" r="100" fill="#1c2541" opacity="0.8"/>
  <path d="M150,150 Q175,100 250,120 Q300,150 250,200 Q150,220 150,150 Z" fill="#3a506b" opacity="0.5"/>
  <circle cx="200" cy="150" r="80" fill="none" stroke="#00b4d8" stroke-width="2" stroke-dasharray="10 5"/>
  <circle cx="200" cy="150" r="120" fill="none" stroke="#0077b6" stroke-width="1" stroke-dasharray="5 15"/>
  <!-- Tech Lobster -->
  <path d="M180,180 C150,220 250,220 220,180 C200,160 200,160 180,180 Z" fill="#ef233c"/>
  <path d="M200,120 Q180,150 180,180 L220,180 Q220,150 200,120 Z" fill="#d90429"/>
  <!-- Claws -->
  <path d="M180,140 Q150,100 130,120 Q140,150 160,150 Z" fill="#ef233c"/>
  <path d="M220,140 Q250,100 270,120 Q260,150 240,150 Z" fill="#ef233c"/>
  <!-- Tech Nodes/Eyes -->
  <circle cx="190" cy="130" r="5" fill="#00f5d4"/>
  <circle cx="210" cy="130" r="5" fill="#00f5d4"/>
  <!-- Antennas -->
  <path d="M190,120 Q170,80 150,90" fill="none" stroke="#00f5d4" stroke-width="2"/>
  <path d="M210,120 Q230,80 250,90" fill="none" stroke="#00f5d4" stroke-width="2"/>
  <!-- TSA Badge -->
  <rect x="180" y="160" width="40" height="20" rx="5" fill="#0077b6"/>
  <text x="200" y="174" fill="#fff" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">TSA</text>
  <!-- Data lines -->
  <path d="M50,150 L120,150" fill="none" stroke="#00b4d8" stroke-width="2" stroke-dasharray="5 5"/>
  <path d="M350,150 L280,150" fill="none" stroke="#00b4d8" stroke-width="2" stroke-dasharray="5 5"/>
</svg>