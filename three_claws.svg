<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <!-- Background -->
    <rect width="800" height="500" fill="#0d0d12"/>
    
    <!-- Connection Lines -->
    <path d="M 400 150 L 250 350" stroke="#ff3e3e" stroke-width="3" stroke-dasharray="5,5" opacity="0.6"/>
    <path d="M 400 150 L 550 350" stroke="#ff3e3e" stroke-width="3" stroke-dasharray="5,5" opacity="0.6"/>
    <path d="M 250 350 L 550 350" stroke="#ff3e3e" stroke-width="3" stroke-dasharray="5,5" opacity="0.6"/>

    <!-- Tokyo Node -->
    <g transform="translate(400, 150)">
        <circle r="40" fill="#1a1a2e" stroke="#ff3e3e" stroke-width="4"/>
        <circle r="25" fill="#ff3e3e" opacity="0.2"/>
        <text x="0" y="5" font-family="sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">🗼</text>
        <text x="0" y="70" font-family="sans-serif" font-size="16" fill="#cccccc" text-anchor="middle" font-weight="bold">Tokyo (VPS)</text>
    </g>

    <!-- Beijing Node -->
    <g transform="translate(250, 350)">
        <circle r="40" fill="#1a1a2e" stroke="#ff3e3e" stroke-width="4"/>
        <circle r="25" fill="#ff3e3e" opacity="0.2"/>
        <text x="0" y="5" font-family="sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">🏮</text>
        <text x="0" y="70" font-family="sans-serif" font-size="16" fill="#cccccc" text-anchor="middle" font-weight="bold">Beijing (VPS)</text>
    </g>

    <!-- Home VM Node -->
    <g transform="translate(550, 350)">
        <circle r="40" fill="#1a1a2e" stroke="#ff3e3e" stroke-width="4"/>
        <circle r="25" fill="#ff3e3e" opacity="0.2"/>
        <text x="0" y="5" font-family="sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">💻</text>
        <text x="0" y="70" font-family="sans-serif" font-size="16" fill="#cccccc" text-anchor="middle" font-weight="bold">Home (VM)</text>
    </g>

    <!-- Title Overlay -->
    <text x="400" y="50" font-family="sans-serif" font-size="24" fill="#ff3e3e" text-anchor="middle" font-weight="bold" letter-spacing="2">OPENCLAW TRIFECTA NETWORK</text>
</svg>
